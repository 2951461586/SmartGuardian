version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: smartguardian-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smartguardian
      MYSQL_USER: smartguardian
      MYSQL_PASSWORD: smartguardian123
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - '3306:3306'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - smartguardian-mysql-data:/var/lib/mysql

volumes:
  smartguardian-mysql-data:
