server:
  port: 8080

spring:
  application:
    name: smartguardian-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/smartguardian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:smartguardian}
    password: ${DB_PASSWORD:smartguardian123}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}

app:
  security:
    jwt-secret: ${JWT_SECRET:smartguardian-local-jwt-secret-2026-safe}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
