  /api/v1/refunds/order/{orderId}:
    get:
      tags: [Refunds]
      summary: Query refunds by order
      x-agc-function-domain: refund
      x-agc-function-name: smartguardian-refund
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/payments:
    post:
      tags: [Payments]
      summary: Create payment order
      x-agc-function-domain: payment
      x-agc-function-name: smartguardian-payment
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/payments/callback:
    post:
      tags: [Payments]
      summary: Handle payment callback
      security: []
      x-agc-function-domain: payment
      x-agc-function-name: smartguardian-payment
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/timeline/students/{studentId}:
    get:
      tags: [Timeline]
      summary: Query student timeline
      x-agc-function-domain: timeline
      x-agc-function-name: smartguardian-timeline
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/cards/today-status:
    get:
      tags: [Cards]
      summary: Query today status card
      x-agc-function-domain: card
      x-agc-function-name: smartguardian-card
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/cards/abnormal-alert:
    get:
      tags: [Cards]
      summary: Query abnormal alert card
      x-agc-function-domain: card
      x-agc-function-name: smartguardian-card
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/workbench/manifest:
    get:
      tags: [Workbench]
      summary: Query workbench manifest
      x-agc-function-domain: workbench
      x-agc-function-name: smartguardian-workbench
      responses:
        '200':
          description: Workbench manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbenchEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    StudentId:
      in: path
      name: studentId
      required: true
      schema:
        type: integer
    ServiceId:
      in: path
      name: serviceId
      required: true
      schema:
        type: integer
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: integer
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: integer
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: integer
    FeedbackId:
      in: path
      name: feedbackId
      required: true
      schema:
        type: integer
    MessageId:
      in: path
      name: messageId
      required: true
      schema:
        type: integer
    AlertId:
      in: path
      name: alertId
      required: true
      schema:
        type: integer
    RefundId:
      in: path
      name: refundId
      required: true
      schema:
        type: integer
  responses:
    Success:
      description: Success envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    Standard:
      description: Standard AGC envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardEnvelope'
    Page:
      description: Standard page envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PageEnvelope'
    Count:
      description: Standard count envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CountEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
    StandardEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
