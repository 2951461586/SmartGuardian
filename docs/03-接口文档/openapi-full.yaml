          $ref: '#/components/responses/Success'
  /api/v1/messages/{messageId}/delete:
    post:
      tags: [Messages]
      summary: Delete message
      x-agc-function-domain: message
      x-agc-function-name: smartguardian-message
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/messages/unread-count:
    get:
      tags: [Messages]
      summary: Get unread message count
      x-agc-function-domain: message
      x-agc-function-name: smartguardian-message
      responses:
        '200':
          $ref: '#/components/responses/Count'
  /api/v1/messages/statistics:
    get:
      tags: [Messages]
      summary: Get message statistics
      x-agc-function-domain: message
      x-agc-function-name: smartguardian-message
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/alerts:
    get:
      tags: [Alerts]
      summary: Query alerts
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      responses:
        '200':
          $ref: '#/components/responses/Page'
  /api/v1/alerts/{alertId}:
    get:
      tags: [Alerts]
      summary: Get alert detail
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/alerts/{alertId}/acknowledge:
    post:
      tags: [Alerts]
      summary: Acknowledge alert
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/alerts/{alertId}/resolve:
    post:
      tags: [Alerts]
      summary: Resolve alert
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/alerts/{alertId}/dismiss:
    post:
      tags: [Alerts]
      summary: Dismiss alert
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/alerts/active-count:
    get:
      tags: [Alerts]
      summary: Get active alert count
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      responses:
        '200':
          $ref: '#/components/responses/Count'
  /api/v1/alerts/statistics:
    get:
      tags: [Alerts]
      summary: Get alert statistics
      x-agc-function-domain: alert
      x-agc-function-name: smartguardian-alert
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/reports/attendance:
    get:
      tags: [Reports]
      summary: Attendance report snapshot
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/reports/finance:
    get:
      tags: [Reports]
      summary: Finance report snapshot
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
