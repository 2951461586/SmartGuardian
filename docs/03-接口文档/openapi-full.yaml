  /api/v1/reports/performance:
    get:
      tags: [Reports]
      summary: Teacher performance report
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/reports/attendance/daily:
    get:
      tags: [Reports]
      summary: Daily attendance report
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/reports/attendance/students:
    get:
      tags: [Reports]
      summary: Student attendance report
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/reports/finance/daily:
    get:
      tags: [Reports]
      summary: Daily finance report
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/reports/finance/products:
    get:
      tags: [Reports]
      summary: Product revenue report
      x-agc-function-domain: report
      x-agc-function-name: smartguardian-report
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/refunds:
    get:
      tags: [Refunds]
      summary: Query refunds
      x-agc-function-domain: refund
      x-agc-function-name: smartguardian-refund
      responses:
        '200':
          $ref: '#/components/responses/Page'
    post:
      tags: [Refunds]
      summary: Create refund request
      x-agc-function-domain: refund
      x-agc-function-name: smartguardian-refund
