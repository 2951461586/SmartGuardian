components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    StudentId:
      in: path
      name: studentId
      required: true
      schema:
        type: integer
    ServiceId:
      in: path
      name: serviceId
      required: true
      schema:
        type: integer
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: integer
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: integer
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: integer
    FeedbackId:
      in: path
      name: feedbackId
      required: true
      schema:
        type: integer
    MessageId:
      in: path
      name: messageId
      required: true
      schema:
        type: integer
    AlertId:
      in: path
      name: alertId
      required: true
      schema:
        type: integer
    RefundId:
      in: path
      name: refundId
      required: true
      schema:
        type: integer
  responses:
    Success:
      description: Success envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    Standard:
      description: Standard AGC envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardEnvelope'
    Page:
      description: Standard page envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PageEnvelope'
    Count:
      description: Standard count envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CountEnvelope'
    Agent:
      description: SmartGuardian Agent envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
    StandardEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
    PageEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                type: object
                additionalProperties: true
            total:
              type: integer
            pageNum:
              type: integer
            pageSize:
              type: integer
    CountEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            count:
              type: number
    AgentChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: 今天孩子托管情况怎么样？
        taskType:
          type: string
          example: SUMMARY
        studentId:
          type: integer
        date:
          type: string
          example: '2026-04-29'
        contextScope:
          type: string
    AgentSummaryRequest:
      type: object
      properties:
        message:
          type: string
        studentId:
          type: integer
        date:
          type: string
    AgentReportRequest:
      type: object
      properties:
        message:
          type: string
        reportType:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        studentId:
          type: integer
    AgentNavigationRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: 打开考勤管理
    AgentEnvelope:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/AgentResponse'
    AgentResponse:
      type: object
      properties:
        agentId:
          type: string
        taskType:
          type: string
        answer:
          type: string
        source:
          type: string
          enum: [LLM, LOCAL_RULES]
        model:
          type: string
        provider:
          type: string
        generatedAt:
          type: string
        contextDate:
          type: string
        summary:
          type: object
          additionalProperties: true
        actions:
          type: array
          items:
            type: object
            additionalProperties: true
        suggestions:
          type: array
          items:
            type: string
        citations:
          type: array
          items:
            type: object
            additionalProperties: true
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        roleType:
          type: string
    UserInfo:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        realName:
          type: string
        mobile:
          type: string
        roleType:
          type: string
        orgId:
          type: integer
        schoolId:
          type: integer
    LoginData:
      type: object
      properties:
        token:
          type: string
        expiresIn:
          type: integer
        userInfo:
          $ref: '#/components/schemas/UserInfo'
    LoginEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginData'
    SessionDeviceRegistrationRequest:
      type: object
      required: [deviceId, notificationToken, notificationProvider]
      properties:
        deviceId:
          type: string
        notificationToken:
          type: string
        notificationProvider:
          type: string
          example: AGC_GATEWAY
        authUid:
          type: string
        authPhone:
          type: string
        clientVersion:
          type: string
        clientPlatform:
          type: string
          example: HarmonyOS
    SessionDeviceRegistrationData:
      type: object
      properties:
        sessionId:
          type: integer
        userId:
          type: integer
        deviceId:
          type: string
        notificationProvider:
          type: string
        notificationTokenBound:
          type: boolean
        authUid:
          type: string
        lastActiveAt:
          type: string
        persisted:
          type: boolean
        compatibilityMode:
          type: string
    SessionDeviceRegistrationEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/SessionDeviceRegistrationData'
    UserEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserInfo'
    WorkbenchManifest:
      type: object
      properties:
        roleType:
          type: string
        version:
          type: string
        visual:
          type: object
          additionalProperties: true
        summary:
          type: object
          additionalProperties: true
        primaryFlows:
          type: array
          items:
            type: object
            additionalProperties: true
        modules:
          type: array
          items:
            type: object
            additionalProperties: true
    WorkbenchEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/WorkbenchManifest'
