components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageNum:
      in: query
      name: pageNum
      schema:
        type: integer
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        default: 10
    StudentId:
      in: path
      name: studentId
      required: true
      schema:
        type: integer
        format: int64
    ServiceId:
      in: path
      name: serviceId
      required: true
      schema:
        type: integer
        format: int64
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: integer
        format: int64
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未登录或令牌失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 业务冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    BaseSuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: 参数错误
        data:
          nullable: true
          example: null

