        '200':
          $ref: '#/components/responses/Page'
  /api/v1/attendance/leave:
    post:
      tags: [Attendance]
      summary: Submit leave request
      x-agc-function-domain: attendance
      x-agc-function-name: smartguardian-attendance
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/homework/tasks:
    get:
      tags: [Homework]
      summary: Query homework tasks
      x-agc-function-domain: homework
      x-agc-function-name: smartguardian-homework
      responses:
        '200':
          $ref: '#/components/responses/Page'
    post:
      tags: [Homework]
      summary: Create homework task
      x-agc-function-domain: homework
      x-agc-function-name: smartguardian-homework
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/homework/tasks/{taskId}:
    get:
      tags: [Homework]
      summary: Get homework task detail
      x-agc-function-domain: homework
      x-agc-function-name: smartguardian-homework
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
