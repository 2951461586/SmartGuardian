      x-agc-function-domain: service
      x-agc-function-name: smartguardian-service
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/orders:
    get:
      tags: [Orders]
      summary: Query orders
      x-agc-function-domain: order
      x-agc-function-name: smartguardian-order
      responses:
        '200':
