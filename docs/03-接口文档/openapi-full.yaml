openapi: 3.0.3
info:
  title: SmartGuardian AGC Contract API
  version: 2026.04.25
  description: >
    AGC API Gateway and Cloud Functions contract view for SmartGuardian.
    External routes remain on /api/v1/* and are dispatched to domain functions.
servers:
  - url: https://agc-api.smartguardian.local
    description: AGC API Gateway
  - url: https://agc-test.smartguardian.local
    description: AGC Test Gateway
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: User
  - name: Students
  - name: ServiceProducts
  - name: Orders
  - name: Sessions
  - name: Attendance
  - name: Homework
  - name: Messages
  - name: Alerts
  - name: Reports
  - name: Refunds
  - name: Payments
  - name: Timeline
  - name: Cards
  - name: Workbench
  - name: Agent
  - name: Security
  - name: Events
  - name: Notifications
  - name: Storage
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and create AGC session
      security: []
      x-agc-function-domain: auth
      x-agc-function-name: smartguardian-auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginEnvelope'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      x-agc-function-domain: auth
      x-agc-function-name: smartguardian-auth
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh current AGC session token
      x-agc-function-domain: auth
      x-agc-function-name: smartguardian-auth
      responses:
        '200':
          description: Refreshed login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginEnvelope'
  /api/v1/auth/session-device:
    post:
      tags: [Auth]
      summary: Bind current AGC session to a HarmonyOS notification endpoint
      x-agc-function-domain: auth
      x-agc-function-name: smartguardian-auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionDeviceRegistrationRequest'
      responses:
        '200':
          description: Session endpoint registration response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDeviceRegistrationEnvelope'
  /api/v1/auth/me:
    get:
      tags: [User]
      summary: Get current user profile
      x-agc-function-domain: user
      x-agc-function-name: smartguardian-user
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
  /api/v1/users:
    get:
      tags: [User]
      summary: Query users for admin workbench
      x-agc-function-domain: user
      x-agc-function-name: smartguardian-user
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/students:
    get:
      tags: [Students]
      summary: Query students
      x-agc-function-domain: student
      x-agc-function-name: smartguardian-student
      responses:
        '200':
          $ref: '#/components/responses/Page'
    post:
      tags: [Students]
      summary: Create student profile
      x-agc-function-domain: student
      x-agc-function-name: smartguardian-student
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/students/{studentId}:
    get:
      tags: [Students]
      summary: Get student detail
      x-agc-function-domain: student
      x-agc-function-name: smartguardian-student
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
    put:
      tags: [Students]
      summary: Update student profile
      x-agc-function-domain: student
      x-agc-function-name: smartguardian-student
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/students/{studentId}/guardians:
    get:
      tags: [Students]
      summary: Query guardian relations
      x-agc-function-domain: student
      x-agc-function-name: smartguardian-student
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
    post:
      tags: [Students]
      summary: Bind guardian relation
      x-agc-function-domain: student
      x-agc-function-name: smartguardian-student
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/service-products:
    get:
      tags: [ServiceProducts]
      summary: Query service products
      x-agc-function-domain: service
      x-agc-function-name: smartguardian-service
      responses:
        '200':
          $ref: '#/components/responses/Standard'
    post:
      tags: [ServiceProducts]
      summary: Create service product
      x-agc-function-domain: service
      x-agc-function-name: smartguardian-service
      responses:
        '200':
