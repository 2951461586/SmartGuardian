openapi: 3.0.3
info:
  title: 学生智慧托管系统 API
  version: 1.2.0
  description: 更完整可导入的 OpenAPI/Swagger 文档，覆盖认证、学生档案、托管服务、订单、排课、考勤、作业、消息、时间线、支付、报表、卡片、告警与退款接口。
servers:
  - url: https://api.smartguardian.local
    description: 开发环境
  - url: https://test-api.smartguardian.local
    description: 测试环境
  - url: https://prod-api.smartguardian.local
    description: 生产环境

tags:
  - name: Auth
    description: 认证与用户
  - name: Students
    description: 学生档案
  - name: ServiceProducts
    description: 托管服务
  - name: Orders
    description: 订单管理
  - name: Sessions
    description: 排课班次
  - name: Attendance
    description: 考勤签到
  - name: Homework
    description: 作业与反馈
  - name: Messages
    description: 消息与通知
  - name: Timeline
    description: 学生动态时间线
  - name: Payments
    description: 支付
  - name: Reports
    description: 统计报表
  - name: Cards
    description: 元服务卡片
  - name: Alerts
    description: 告警服务
  - name: Refunds
    description: 退款服务

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: parent_zhang
              password: '123456'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/students:
    get:
      tags: [Students]
      summary: 查询学生列表
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: schoolId
          schema:
            type: integer
            format: int64
        - in: query
          name: classId
          schema:
            type: integer
            format: int64
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentPageResponse'
    post:
      tags: [Students]
      summary: 新增学生档案
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/students/{studentId}:
    get:
      tags: [Students]
      summary: 查询学生详情
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDetailApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Students]
      summary: 更新学生档案
      parameters:
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/students/{studentId}/guardians:
    post:
      tags: [Students]
      summary: 绑定监护关系
      parameters:
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardianBindRequest'
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/service-products:
    get:
      tags: [ServiceProducts]
      summary: 查询托管服务列表
      parameters:
        - in: query
          name: serviceType
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: orgId
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProductListResponse'
    post:
      tags: [ServiceProducts]
      summary: 新增托管服务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceProductCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdApiResponse'

  /api/v1/service-products/{serviceId}:
    get:
      tags: [ServiceProducts]
      summary: 查询托管服务详情
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProductApiResponse'
    put:
      tags: [ServiceProducts]
      summary: 更新托管服务
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceProductUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/service-products/{serviceId}/status:
    patch:
      tags: [ServiceProducts]
      summary: 上下架托管服务
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  example: ENABLED
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/orders:
    get:
      tags: [Orders]
      summary: 查询订单列表
      parameters:
        - in: query
          name: studentId
          schema:
            type: integer
            format: int64
        - in: query
          name: guardianUserId
          schema:
            type: integer
            format: int64
        - in: query
          name: orderStatus
          schema:
            type: string
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'
    post:
      tags: [Orders]
      summary: 创建订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailApiResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      summary: 查询订单详情
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailApiResponse'

  /api/v1/orders/{orderId}/audit:
    post:
      tags: [Orders]
      summary: 审核订单
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderAuditRequest'
      responses:
        '200':
          description: 审核成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/orders/{orderId}/cancel:
    post:
      tags: [Orders]
      summary: 取消订单
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/orders/{orderId}/refund:
    post:
      tags: [Orders]
      summary: 申请退款
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: 临时调整托管安排
      responses:
        '200':
          description: 申请成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: 查询班次列表
      parameters:
        - in: query
          name: sessionDate
          schema:
            type: string
            format: date
        - in: query
          name: teacherUserId
          schema:
            type: integer
            format: int64
        - in: query
          name: orgId
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'

  /api/v1/sessions/generate:
    post:
      tags: [Sessions]
      summary: 智能排课
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionGenerateRequest'
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/sessions/{sessionId}:
    put:
      tags: [Sessions]
      summary: 调整班次
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionUpdateRequest'
      responses:
        '200':
          description: 调整成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/sessions/{sessionId}/students:
    get:
      tags: [Sessions]
      summary: 查询班次学生名单
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStudentListResponse'

  /api/v1/attendance:
    get:
      tags: [Attendance]
      summary: 查询考勤记录
      parameters:
        - in: query
          name: studentId
          schema:
            type: integer
            format: int64
        - in: query
          name: attendanceDate
          schema:
            type: string
            format: date
        - in: query
          name: sessionId
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendancePageResponse'

  /api/v1/attendance/sign-in:
    post:
      tags: [Attendance]
      summary: 学生签到
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceSignInRequest'
      responses:
        '200':
          description: 签到成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordApiResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/attendance/sign-out:
    post:
      tags: [Attendance]
      summary: 学生签退
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceSignOutRequest'
      responses:
        '200':
          description: 签退成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/attendance/abnormal-events:
    get:
      tags: [Attendance]
      summary: 查询异常事件
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: abnormalType
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbnormalEventPageResponse'

  /api/v1/attendance/abnormal-events/{eventId}/handle:
    post:
      tags: [Attendance]
      summary: 异常处置
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbnormalHandleRequest'
      responses:
        '200':
          description: 处置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/homework/tasks:
    get:
      tags: [Homework]
      summary: 查询作业任务列表
      parameters:
        - in: query
          name: studentId
          schema:
            type: integer
            format: int64
        - in: query
          name: taskDate
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkTaskListResponse'
    post:
      tags: [Homework]
      summary: 新增作业任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkTaskCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdApiResponse'

  /api/v1/homework/tasks/{taskId}:
    put:
      tags: [Homework]
      summary: 更新作业进度
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkTaskUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/homework/feedback:
    post:
      tags: [Homework]
      summary: 提交作业反馈
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkFeedbackCreateRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdApiResponse'

  /api/v1/homework/feedback/{feedbackId}/confirm:
    post:
      tags: [Homework]
      summary: 家长确认反馈
      parameters:
        - in: path
          name: feedbackId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/messages/conversations:
    get:
      tags: [Messages]
      summary: 查询会话列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'

  /api/v1/messages:
    get:
      tags: [Messages]
      summary: 查询消息列表
      parameters:
        - in: query
          name: conversationId
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePageResponse'
    post:
      tags: [Messages]
      summary: 发送消息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageSendRequest'
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdApiResponse'

  /api/v1/messages/{messageId}/read:
    post:
      tags: [Messages]
      summary: 消息已读
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/notifications:
    get:
      tags: [Messages]
      summary: 查询系统通知
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePageResponse'

  /api/v1/timeline/students/{studentId}:
    get:
      tags: [Timeline]
      summary: 查询学生动态时间线
      parameters:
        - $ref: '#/components/parameters/StudentId'
        - in: query
          name: bizDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineListResponse'

  /api/v1/timeline/events:
    post:
      tags: [Timeline]
      summary: 新增动态事件
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimelineCreateRequest'
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdApiResponse'

  /api/v1/payments:
    post:
      tags: [Payments]
      summary: 创建支付单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'

  /api/v1/payments/{paymentNo}:
    get:
      tags: [Payments]
      summary: 查询支付状态
      parameters:
        - in: path
          name: paymentNo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'

  /api/v1/payments/{paymentNo}/refund:
    post:
      tags: [Payments]
      summary: 退款处理
      parameters:
        - in: path
          name: paymentNo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refundAmount:
                  type: number
                  format: double
                  example: 800
                reason:
                  type: string
                  example: 家长申请退款
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/payments/callback:
    post:
      tags: [Payments]
      summary: 支付回调
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: 回调接收成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseSuccessResponse'

  /api/v1/reports/attendance:
    get:
      tags: [Reports]
      summary: 考勤统计报表
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: orgId
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportAttendanceResponse'

  /api/v1/reports/finance:
    get:
      tags: [Reports]
      summary: 财务统计报表
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceReportApiResponse'

  /api/v1/reports/teacher-performance:
    get:
      tags: [Reports]
      summary: 教师绩效报表
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherPerformanceApiResponse'

  /api/v1/reports/abnormal-events:
    get:
      tags: [Reports]
      summary: 异常事件报表
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功
