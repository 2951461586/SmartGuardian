        '200':
          $ref: '#/components/responses/Standard'
  /api/v1/homework/feedback/{feedbackId}/confirm:
    post:
      tags: [Homework]
      summary: Confirm homework feedback
      x-agc-function-domain: homework
      x-agc-function-name: smartguardian-homework
      parameters:
