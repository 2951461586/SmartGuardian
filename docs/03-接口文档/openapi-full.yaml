  /api/v1/refunds/{refundId}/cancel:
    post:
      tags: [Refunds]
      summary: Cancel refund
      x-agc-function-domain: refund
      x-agc-function-name: smartguardian-refund
      parameters:
        - $ref: '#/components/parameters/RefundId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/refunds/statistics:
    get:
      tags: [Refunds]
      summary: Get refund statistics
      x-agc-function-domain: refund
      x-agc-function-name: smartguardian-refund
      responses:
